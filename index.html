<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pixel Animator — A professional web-based pixel art editor and animation tool. Create stunning pixel art, animate sprites, and export to PNG, GIF, or sprite sheets.">
    <title>Pixel Animator — Pixel Art & Animation Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- ===== TOP MENU BAR ===== -->
    <header id="menu-bar" class="menu-bar">
        <div class="menu-bar__brand">
            <svg class="menu-bar__logo" viewBox="0 0 24 24" width="22" height="22" fill="none">
                <rect x="2" y="2" width="8" height="8" rx="1" fill="#58a6ff"/>
                <rect x="14" y="2" width="8" height="8" rx="1" fill="#bc8cff"/>
                <rect x="2" y="14" width="8" height="8" rx="1" fill="#3fb950"/>
                <rect x="14" y="14" width="8" height="8" rx="1" fill="#ff6e59"/>
            </svg>
            <span class="menu-bar__title">Pixel Animator</span>
        </div>
        <nav class="menu-bar__nav">
            <button class="menu-btn" id="menu-file">File <span class="menu-btn__arrow">▾</span></button>
            <button class="menu-btn" id="menu-edit">Edit <span class="menu-btn__arrow">▾</span></button>
            <button class="menu-btn" id="menu-view">View <span class="menu-btn__arrow">▾</span></button>
        </nav>
        <div class="menu-bar__right">
            <span id="status-coords" class="status-text">0, 0</span>
            <span id="status-dimensions" class="status-text">32×32</span>
            <span id="status-zoom" class="status-text">16×</span>
        </div>
    </header>

    <!-- ===== DROPDOWN MENUS ===== -->
    <div id="dropdown-file" class="dropdown-menu" style="display:none;">
        <button class="dropdown-item" id="action-new-project">
            <span class="dropdown-item__icon">📄</span> New Project…
            <span class="dropdown-item__shortcut">Ctrl+N</span>
        </button>
        <button class="dropdown-item" id="action-save-project">
            <span class="dropdown-item__icon">💾</span> Save Project
            <span class="dropdown-item__shortcut">Ctrl+S</span>
        </button>
        <button class="dropdown-item" id="action-load-project">
            <span class="dropdown-item__icon">📂</span> Open Project…
            <span class="dropdown-item__shortcut">Ctrl+O</span>
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" id="action-import-image">
            <span class="dropdown-item__icon">🖼️</span> Import Image…
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" id="action-export-png">
            <span class="dropdown-item__icon">🖼️</span> Export as PNG…
        </button>
        <button class="dropdown-item" id="action-export-gif">
            <span class="dropdown-item__icon">🎞️</span> Export as GIF…
        </button>
        <button class="dropdown-item" id="action-export-spritesheet">
            <span class="dropdown-item__icon">🧩</span> Export Sprite Sheet…
        </button>
    </div>
    <div id="dropdown-edit" class="dropdown-menu" style="display:none;">
        <button class="dropdown-item" id="action-undo">
            <span class="dropdown-item__icon">↩️</span> Undo
            <span class="dropdown-item__shortcut">Ctrl+Z</span>
        </button>
        <button class="dropdown-item" id="action-redo">
            <span class="dropdown-item__icon">↪️</span> Redo
            <span class="dropdown-item__shortcut">Ctrl+Shift+Z</span>
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" id="action-clear-layer">
            <span class="dropdown-item__icon">🗑️</span> Clear Layer
            <span class="dropdown-item__shortcut">Del</span>
        </button>
    </div>
    <div id="dropdown-view" class="dropdown-menu" style="display:none;">
        <button class="dropdown-item" id="action-toggle-grid">
            <span class="dropdown-item__icon">⊞</span> Toggle Grid
            <span class="dropdown-item__shortcut">G</span>
        </button>
        <button class="dropdown-item" id="action-toggle-onion">
            <span class="dropdown-item__icon">🧅</span> Toggle Onion Skin
            <span class="dropdown-item__shortcut">O</span>
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" id="action-zoom-in">
            <span class="dropdown-item__icon">🔍</span> Zoom In
            <span class="dropdown-item__shortcut">+</span>
        </button>
        <button class="dropdown-item" id="action-zoom-out">
            <span class="dropdown-item__icon">🔍</span> Zoom Out
            <span class="dropdown-item__shortcut">-</span>
        </button>
        <button class="dropdown-item" id="action-zoom-fit">
            <span class="dropdown-item__icon">⊡</span> Fit to View
            <span class="dropdown-item__shortcut">0</span>
        </button>
    </div>

    <!-- ===== NEW PROJECT DIALOG ===== -->
    <div id="new-project-dialog" class="modal-overlay" style="display:none;">
        <div class="modal-dialog">
            <h2 class="modal-dialog__title">New Project</h2>
            <div class="modal-dialog__body">
                <div class="form-group">
                    <label class="form-label">Preset</label>
                    <select id="new-project-preset" class="form-select">
                        <option value="8">8 × 8</option>
                        <option value="16">16 × 16</option>
                        <option value="32" selected>32 × 32</option>
                        <option value="64">64 × 64</option>
                        <option value="128">128 × 128</option>
                        <option value="custom">Custom…</option>
                    </select>
                </div>
                <div id="custom-size-group" class="form-group" style="display:none;">
                    <label class="form-label">Width</label>
                    <input type="number" id="new-project-width" class="form-input" min="1" max="256" value="32">
                    <label class="form-label">Height</label>
                    <input type="number" id="new-project-height" class="form-input" min="1" max="256" value="32">
                </div>
            </div>
            <div class="modal-dialog__footer">
                <button class="btn btn--ghost" id="new-project-cancel">Cancel</button>
                <button class="btn btn--primary" id="new-project-create">Create</button>
            </div>
        </div>
    </div>

    <!-- ===== MAIN LAYOUT ===== -->
    <main id="app-layout" class="app-layout">
        <!-- LEFT TOOLBAR -->
        <aside id="toolbar" class="toolbar">
            <div class="toolbar__tools">
                <button class="tool-btn active" data-tool="pencil" title="Pencil (B)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4.01 4.01 0 0 1-5.66 0L2.81 17c-.78-.78-.78-2.05 0-2.83l10.6-10.61a2.01 2.01 0 0 1 2.83 0zM4.22 15.58l3.54 3.53c.78.79 2.04.79 2.83 0l3.53-3.53-4.95-4.95-4.95 4.95z" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="bucket" title="Bucket Fill (F)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M16.56 8.94L8.32.69 6.91 2.1 9.73 4.92 2.39 12.26c-.59.59-.59 1.54 0 2.12l5.66 5.66c.59.59 1.54.59 2.12 0l6.39-6.38c.59-.59.59-1.54 0-2.12zM5.21 13.38L10.08 8.5l4.87 4.88H5.21zM19 17.5c0 1.38-1.12 2.5-2.5 2.5S14 18.88 14 17.5c0-1.07 1.47-3.13 2.1-3.95.27-.35.8-.35 1.07 0 .63.82 1.83 2.88 1.83 3.95z" fill="currentColor"/></svg>
                </button>
                <div class="toolbar__separator"></div>
                <button class="tool-btn" data-tool="line" title="Line (L)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><line x1="4" y1="20" x2="20" y2="4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
                </button>
                <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="5" width="18" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <button class="tool-btn" data-tool="ellipse" title="Ellipse (C)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><ellipse cx="12" cy="12" rx="9" ry="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </button>
                <div class="toolbar__separator"></div>
                <button class="tool-btn" data-tool="selection" title="Selection (S)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="1" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/></svg>
                </button>
                <button class="tool-btn" data-tool="move" title="Move (V)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M20.71 5.63l-2.34-2.34a1 1 0 0 0-1.41 0l-3.12 3.12-1.23-1.21-1.42 1.42 1.21 1.21L3 17.25V21h3.75l9.42-9.42 1.21 1.21 1.42-1.42-1.21-1.21 3.12-3.12a1 1 0 0 0 0-1.41zM6.92 19H5v-1.92l8.75-8.75 1.92 1.92L6.92 19z" fill="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="mirror-pen" title="Mirror Pen (M)">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2v20M8 6l-4 4v4l4 4M16 6l4 4v4l-4 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <!-- Shape mode toggle (for rectangle/ellipse) -->
            <div id="shape-mode-toggle" class="toolbar__shape-mode" style="display:none;">
                <button class="shape-mode-btn active" data-mode="outline" title="Outline">◻</button>
                <button class="shape-mode-btn" data-mode="filled" title="Filled">◼</button>
            </div>
            <!-- Color swatches at bottom -->
            <div class="toolbar__colors">
                <div class="color-swatch-stack">
                    <div id="secondary-color" class="color-swatch color-swatch--secondary" title="Secondary Color"></div>
                    <div id="primary-color" class="color-swatch color-swatch--primary" title="Primary Color"></div>
                </div>
                <button id="swap-colors" class="swap-btn" title="Swap Colors (X)">⇄</button>
            </div>
        </aside>

        <!-- CENTER CANVAS -->
        <section id="canvas-area" class="canvas-area">
            <canvas id="main-canvas"></canvas>
        </section>

        <!-- RIGHT SIDEBAR -->
        <aside id="sidebar" class="sidebar">
            <!-- Preview Window -->
            <div class="panel preview-panel">
                <div class="panel__header">
                    <span class="panel__title">Preview</span>
                </div>
                <div class="panel__body preview-panel__body">
                    <canvas id="preview-canvas" width="128" height="128"></canvas>
                </div>
            </div>

            <!-- Color Palette -->
            <div class="panel palette-panel">
                <div class="panel__header">
                    <span class="panel__title">Palette</span>
                    <button id="edit-palette-color" class="panel__action-btn" title="Edit Color">✎</button>
                </div>
                <div class="panel__body">
                    <div id="palette-grid" class="palette-grid"></div>
                </div>
            </div>

            <!-- Color Picker (hidden by default) -->
            <div id="color-picker-panel" class="panel color-picker-panel" style="display:none;">
                <div class="panel__header">
                    <span class="panel__title">Color Picker</span>
                    <button id="close-color-picker" class="panel__action-btn" title="Close">✕</button>
                </div>
                <div class="panel__body">
                    <div id="color-picker-area" class="color-picker">
                        <canvas id="color-picker-canvas" width="200" height="160"></canvas>
                        <canvas id="hue-slider-canvas" width="200" height="20"></canvas>
                        <canvas id="alpha-slider-canvas" width="200" height="14"></canvas>
                        <div class="color-picker__inputs">
                            <div class="color-input-group">
                                <label>R</label>
                                <input type="number" id="color-r" class="color-input" min="0" max="255" value="255">
                            </div>
                            <div class="color-input-group">
                                <label>G</label>
                                <input type="number" id="color-g" class="color-input" min="0" max="255" value="255">
                            </div>
                            <div class="color-input-group">
                                <label>B</label>
                                <input type="number" id="color-b" class="color-input" min="0" max="255" value="255">
                            </div>
                            <div class="color-input-group">
                                <label>A</label>
                                <input type="number" id="color-a" class="color-input" min="0" max="255" value="255">
                            </div>
                            <div class="color-input-group color-input-group--hex">
                                <label>#</label>
                                <input type="text" id="color-hex" class="color-input color-input--hex" value="FFFFFF" maxlength="6">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Layers -->
            <div class="panel layers-panel">
                <div class="panel__header">
                    <span class="panel__title">Layers</span>
                    <div class="panel__actions">
                        <button id="add-layer" class="panel__action-btn" title="Add Layer">+</button>
                        <button id="delete-layer" class="panel__action-btn" title="Delete Layer">🗑</button>
                        <button id="duplicate-layer" class="panel__action-btn" title="Duplicate Layer">⧉</button>
                        <button id="merge-layer-down" class="panel__action-btn" title="Merge Down">⤓</button>
                    </div>
                </div>
                <div class="panel__body">
                    <div id="layers-list" class="layers-list"></div>
                </div>
            </div>
        </aside>
    </main>

    <!-- ===== BOTTOM TIMELINE ===== -->
    <footer id="timeline" class="timeline">
        <div class="timeline__controls">
            <button id="anim-first" class="timeline-btn" title="First Frame">⏮</button>
            <button id="anim-prev" class="timeline-btn" title="Previous Frame">⏪</button>
            <button id="anim-play" class="timeline-btn timeline-btn--play" title="Play/Pause (Space)">▶</button>
            <button id="anim-next" class="timeline-btn" title="Next Frame">⏩</button>
            <button id="anim-last" class="timeline-btn" title="Last Frame">⏭</button>
            <div class="timeline__fps">
                <label class="timeline__fps-label">FPS</label>
                <input type="number" id="fps-input" class="fps-input" min="1" max="60" value="12">
            </div>
            <button id="toggle-loop" class="timeline-btn timeline-btn--active" title="Loop">🔁</button>
            <button id="toggle-onion-skin" class="timeline-btn" title="Onion Skin (O)">🧅</button>
        </div>
        <div id="timeline-frames" class="timeline__frames">
            <!-- Frame thumbnails rendered dynamically -->
        </div>
        <div class="timeline__frame-actions">
            <button id="add-frame" class="timeline-btn" title="Add Frame">+</button>
            <button id="delete-frame" class="timeline-btn" title="Delete Frame">🗑</button>
            <button id="duplicate-frame" class="timeline-btn" title="Duplicate Frame">⧉</button>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
